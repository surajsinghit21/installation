apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: netflix-project
  namespace: argocd

spec:
  description: netflix Application project

  sourceRepos:
    - "https://github.com/surajsinghit21/installation.git"

  destinations:
    - namespace: test-ingress
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
